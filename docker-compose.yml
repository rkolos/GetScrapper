version: '3.8'

services:
  universal-renderer:
    build: .
    container_name: universal-renderer
    environment:
      # Настройки рендерера
      - RENDERER_LOG_LEVEL=INFO
      - RENDERER_HEADLESS=true
      - RENDERER_TIMEOUT=30000
      
      # Browserbase credentials (замените на ваши)
      # - BROWSERBASE_API_KEY=your_api_key_here
      # - BROWSERBASE_PROJECT_ID=your_project_id_here
    volumes:
      # Монтирование для сохранения результатов
      - ./output:/app/output
      - ./logs:/app/logs
    ports:
      # Если нужен веб-интерфейс
      - "8000:8000"
    restart: unless-stopped
    
    # Ограничения ресурсов
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    
    # Команда по умолчанию
    command: ["python3", "cli.py", "--help"]

  # Опциональный веб-сервер для API
  web-server:
    build: .
    container_name: renderer-web-server
    environment:
      - RENDERER_LOG_LEVEL=INFO
      - RENDERER_HEADLESS=true
      - RENDERER_TIMEOUT=30000
    ports:
      - "8001:8000"
    volumes:
      - ./output:/app/output
    restart: unless-stopped
    command: ["python3", "-m", "http.server", "8000"]
    profiles:
      - web