version: '3.8'

services:
  # API сервер (основной сервис)
  api-server:
    build: .
    container_name: universal-renderer-api
    environment:
      # Настройки рендерера
      - RENDERER_LOG_LEVEL=INFO
      - RENDERER_HEADLESS=true
      - RENDERER_TIMEOUT=30000
      
      # Browserbase credentials (замените на ваши)
      # - BROWSERBASE_API_KEY=your_api_key_here
      # - BROWSERBASE_PROJECT_ID=your_project_id_here
    volumes:
      # Монтирование для сохранения результатов
      - ./output:/app/output
      - ./logs:/app/logs
    ports:
      # API сервер
      - "8000:8000"
    restart: unless-stopped
    
    # Ограничения ресурсов
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    
    # Команда запуска API сервера
    command: ["python3", "api_server.py"]
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # CLI сервис (для пакетной обработки)
  cli-service:
    build: .
    container_name: universal-renderer-cli
    environment:
      # Настройки рендерера
      - RENDERER_LOG_LEVEL=INFO
      - RENDERER_HEADLESS=true
      - RENDERER_TIMEOUT=30000
      
      # Browserbase credentials (замените на ваши)
      # - BROWSERBASE_API_KEY=your_api_key_here
      # - BROWSERBASE_PROJECT_ID=your_project_id_here
    volumes:
      # Монтирование для сохранения результатов
      - ./output:/app/output
      - ./logs:/app/logs
    restart: "no"
    
    # Ограничения ресурсов
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    
    # Команда по умолчанию (показывает справку)
    command: ["python3", "cli.py", "--help"]
    
    # Запускается только при необходимости
    profiles:
      - cli